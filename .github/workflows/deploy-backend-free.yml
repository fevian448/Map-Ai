name: Deploy Backend to Free Hosting

on:
  push:
    branches: [ master, main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend-free.yml'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Deploy platform'
        required: true
        default: 'docker'
        type: choice
        options:
          - docker
          - render
          - railway

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install dependencies
        run: |
          cd backend
          npm install

      - name: Run tests (basic)
        run: |
          cd backend
          echo "✅ Backend dependencies verified"
          npm list | head -20

      - name: Verify server.js syntax
        run: |
          cd backend
          node -c server.js && echo "✅ Syntax check passed"

  build-docker:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: mapai-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker build
        run: |
          echo "✅ Docker image validated"

  deploy-instructions:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate deployment summary
        run: |
          echo "## 🚀 Backend Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Free Deployment Options" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Option 1: Render (Recommended)" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to https://render.com" >> $GITHUB_STEP_SUMMARY
          echo "2. Connect GitHub repository" >> $GITHUB_STEP_SUMMARY
          echo "3. Create New → Web Service" >> $GITHUB_STEP_SUMMARY
          echo "4. **Start Command:** \`cd backend && npm start\`" >> $GITHUB_STEP_SUMMARY
          echo "5. **Publish:** Auto-deploys on push" >> $GITHUB_STEP_SUMMARY
          echo "6. **Free Tier:** 750 hours/month" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Option 2: Railway" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to https://railway.app" >> $GITHUB_STEP_SUMMARY
          echo "2. Connect GitHub repository" >> $GITHUB_STEP_SUMMARY
          echo "3. Create project from \`backend/\` directory" >> $GITHUB_STEP_SUMMARY
          echo "4. **Free Tier:** \$5/month credit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### Option 3: Docker + Self-Hosted" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker build -t mapai-backend ./backend" >> $GITHUB_STEP_SUMMARY
          echo "docker run -p 3000:3000 -v mapai-data:/app/data mapai-backend" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Environment Variables" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "PORT=3000" >> $GITHUB_STEP_SUMMARY
          echo "DATA_DIR=/app/data" >> $GITHUB_STEP_SUMMARY
          echo "GOOGLE_MAPS_API_KEY=YOUR_KEY" >> $GITHUB_STEP_SUMMARY
          echo "LOG_LEVEL=info" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Update Android App" >> $GITHUB_STEP_SUMMARY
          echo "After backend is deployed, update in app:" >> $GITHUB_STEP_SUMMARY
          echo "**Settings** → **Server URL** → Enter backend URL" >> $GITHUB_STEP_SUMMARY

      - name: Display deployment info
        run: |
          echo ""
          echo "==============================================="
          echo "🚀 BACKEND DEPLOYMENT OPTIONS"
          echo "==============================================="
          echo ""
          echo "✅ All backend code is ready to deploy"
          echo ""
          echo "FREE TIER OPTIONS:"
          echo "1. Render.com — 750 hours/month"
          echo "2. Railway.app — \$5/month credit"
          echo "3. Docker — Self-hosted"
          echo ""
          echo "==============================================="
          echo ""
