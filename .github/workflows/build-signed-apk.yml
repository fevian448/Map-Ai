name: Build and Sign APK for Google Play

on:
  push:
    branches: [ master, main ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/build-signed-apk.yml'
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        required: true
        default: 'internal'
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

permissions:
  contents: write
  packages: write

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 36
          build-tools: 35.0.0

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mapai-release.keystore
          ls -lh mapai-release.keystore

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Signed Release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=mapai-release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Build Debug APK (for comparison)
        run: |
          ./gradlew assembleDebug

      - name: Verify APK Signature
        run: |
          jarsigner -verify -verbose -certs app/build/outputs/apk/release/app-release.apk | head -20 || true
          echo "APK built successfully"

      - name: Upload Signed APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mapai-signed-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mapai-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (Latest Build)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/debug/app-debug.apk
          body: |
            ## MapAi Build #${{ github.run_number }}
            
            **Signed APK:** `app-release.apk` ✅ Ready for Google Play
            **Debug APK:** `app-debug.apk` — Testing only
            
            ### Commit Details
            - **SHA:** ${{ github.sha }}
            - **Branch:** ${{ github.ref }}
            - **Message:** ${{ github.event.head_commit.message }}
            
            ### Installation
            
            **For Testing (Debug):**
            ```bash
            adb install -r app-debug.apk
            ```
            
            **For Production (Release):**
            Upload to Google Play Console via internal testing track
            
            ### Account
            **Developer:** fevianbenjo48@gmail.com
            
            Generated: ${{ github.event.head_commit.timestamp }}
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **APK Built Successfully**\n\n📦 **Artifacts Available:**\n- Release APK (signed): mapai-signed-release\n- Debug APK: mapai-debug\n\nDownload from Actions tab → Artifacts`
            })

      - name: Cleanup Keystore
        if: always()
        run: |
          rm -f mapai-release.keystore
          echo "Keystore cleaned up"
